services:
  website:
    build:
      context: ./src/website
    networks:
      - sandtris-network
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    depends_on:
      server:
        condition: service_started

  server:
    build:
      context: ./src/backend/SandtrisServer
    networks:
      - sandtris-network
    # we have to actually expose the port
    # because the browser somehow has to access it
    ports:
      - "5015:5015"

networks:
  sandtris-network:
