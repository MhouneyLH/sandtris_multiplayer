services:
  website:
    build:
      context: ./src/website
    networks:
      - sandtris-network
    ports:
      - "6000:8080"
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_BASE_URL=http://server:8080
      - VITE_WEBSOCKET_URL=ws://server:8080/ws
    
  server:
    build:
      context: ./src/backend/SandtrisServer
    networks:
      - sandtris-network
    expose:
      - "8080"

networks:
  sandtris-network: