services:
  website:
    build:
      context: ./src/frontend/website
      # has to be set as we are serving static files
      args:
        VITE_BACKEND_BASE_URL: http://localhost:5015
        VITE_WEBSOCKET_URL: ws://localhost:5015/ws
    networks:
      - sandtris-network
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    depends_on:
      server:
        condition: service_started

  server:
    build:
      context: ./src/backend/SandtrisServer
    networks:
      - sandtris-network
    # we have to actually expose the port
    # because the browser somehow has to access it
    ports:
      - "5015:5015"

networks:
  sandtris-network:
