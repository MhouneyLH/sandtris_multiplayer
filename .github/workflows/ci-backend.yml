name: CI (Backend)

on:
  push:
    branches: ["**"]
    paths:
      - "src/backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "src/backend/**"
      - ".github/workflows/ci-backend.yml"

env:
  REGISTRY: ghcr.io
  SANDTRIS_SERVER_IMAGE_NAME: mhouneylh/sandtris-multiplayer/sandtris-server
  WORKING_DIRECTORY: ./src/backend/SandtrisServer

jobs:
  build-and-test-server:
    name: Build & Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dotnet restore

      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dotnet test --no-build --configuration Release --verbosity normal

  docker-build-server:
    name: Docker Build Server (no push)
    runs-on: ubuntu-latest
    needs: build-and-test-server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (cache only, no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.SANDTRIS_SERVER_IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
