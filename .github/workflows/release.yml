name: Create new Release Release (Build, Push & Deploy)

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  SANDTRIS_SERVER_IMAGE_NAME: sandtris-multiplayer/sandtris_server
  WEBSITE_IMAGE_NAME: sandtris-multiplayer/website
  WEBSITE_WORKING_DIRECTORY: ./src/frontend/website

jobs:
  release-sandtris-server:
    name: Release Sandtris Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # needed to push to GHCR

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # built-in, no extra secret needed

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ SANDTRIS_SERVER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}        # e.g. 1.2.3
            type=semver,pattern={{major}}.{{minor}} # e.g. 1.2
            type=sha,prefix=sha-                   # e.g. sha-a1b2c3d
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & Push Sandtris Server
        uses: docker/build-push-action@v7
        with:
          context: ./src/backend/SandtrisServer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-website:
    name: Release Website Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & Push Website
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.WEBSITE_WORKING_DIRECTORY }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-website-vercel:
    name: Deploy Website to Vercel
    runs-on: ubuntu-latest
    needs: [release-website]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-sandtris-server, release-website]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for changelog generation

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # auto-generates changelog from commits/PRs
          tag_name: ${{ github.ref_name }}
          body: |
            ## Docker Images

            **Sandtris Server:**
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.SANDTRIS_SERVER_IMAGE_NAME }}:${{ github.ref_name }}
            ```

            **Website:**
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE_NAME }}:${{ github.ref_name }}
            ```
