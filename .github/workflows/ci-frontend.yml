name: CI (Frontend)

on:
  push:
    branches: ["**"]
    paths:
      - "src/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "src/frontend/**"
      - ".github/workflows/ci-frontend.yml"

env:
  REGISTRY: ghcr.io
  WEBSITE_IMAGE_NAME: sandtris-multiplayer/website
  WEBSITE_WORKING_DIRECTORY: ./src/frontend/website

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('${{ env.WEBSITE_WORKING_DIRECTORY }}/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: pnpm install

      - name: Lint
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: pnpm run lint

      - name: Build
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: pnpm run build

  docker-build-website:
    name: Docker Build Website (no push)
    runs-on: ubuntu-latest
    needs: build-website

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WEBSITE_WORKING_DIRECTORY }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
