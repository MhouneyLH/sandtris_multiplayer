name: CI — Frontend

on:
  push:
    branches: ["**"]
    paths:
      - "src/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "src/frontend/**"
      - ".github/workflows/ci-frontend.yml"

env:
  REGISTRY: ghcr.io
  WEBSITE_IMAGE_NAME: ${{ github.repository }}/website
  WEBSITE_WORKING_DIRECTORY: ./src/frontend/website

jobs:
  build-and-test-website:
    name: Build & Test Website  
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: ${{ env.WEBSITE_WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: npm run lint --if-present

      - name: Test
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: npm test --if-present

      - name: Build
        working-directory: ${{ env.WEBSITE_WORKING_DIRECTORY }}
        run: npm run build --if-present

  docker-build-website:
    name: Docker Build Website (no push)
    runs-on: ubuntu-latest
    needs: build-and-test-website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WEBSITE_WORKING_DIRECTORY }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
